<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PulseVault – Authorization</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a1a;color:#f5f5f5;font-family:'Segoe UI',Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
    .card{background:#1a1a2e;border:1px solid #6366f1;border-radius:16px;padding:2.5rem;max-width:560px;width:100%;text-align:center}
    .logo{font-size:1.3rem;font-weight:900;letter-spacing:2px;margin-bottom:1.5rem}
    .logo span{background:linear-gradient(135deg,#818cf8,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    h1{font-size:1.4rem;font-weight:700;margin-bottom:.75rem}
    .code-box{background:#0f0f1a;border:1px solid #374151;border-radius:8px;padding:1rem;margin:1.5rem 0;font-family:monospace;font-size:.85rem;word-break:break-all;color:#818cf8;text-align:left;min-height:3rem}
    .label{font-size:.8rem;color:#6b7280;margin-bottom:.5rem}
    .copy-btn{background:#6366f1;color:white;border:none;padding:.6rem 1.5rem;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;margin-top:.5rem}
    .copy-btn:hover{background:#4f46e5}
    .instruction{font-size:.85rem;color:#9ca3af;margin-top:1.5rem;line-height:1.7}
    .error{color:#f87171}
    .success{color:#34d399}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">PULSE<span>VAULT</span></div>
  <h1 id="title">Processing authorization…</h1>

  <div class="label">Authorization Code</div>
  <div class="code-box" id="code-display">—</div>
  <button class="copy-btn" onclick="copyCode()">Copy Code</button>

  <p class="instruction" id="instruction"></p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const code  = params.get('code');
  const error = params.get('error');
  const state = params.get('state');

  const display     = document.getElementById('code-display');
  const title       = document.getElementById('title');
  const instruction = document.getElementById('instruction');

  if (error) {
    title.textContent = 'Authorization failed';
    display.innerHTML = `<span class="error">${error}: ${params.get('error_description') || ''}</span>`;
    instruction.textContent = 'Close this tab and try running the token script again.';
  } else if (code) {
    title.innerHTML = '<span class="success">✅ Authorization successful!</span>';
    display.textContent = code;
    instruction.textContent = 'Copy the code above, then paste it into your terminal when the script asks for it.';
  } else {
    title.textContent = 'No authorization code found.';
    instruction.textContent = 'Make sure you arrived here from the TikTok login flow.';
  }

  function copyCode() {
    const code = document.getElementById('code-display').textContent;
    navigator.clipboard.writeText(code).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy Code', 2000);
    });
  }
</script>
</body>
</html>
