<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PulseVault – Daily Content That Moves You</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a1a;color:#f5f5f5;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
    .hero{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem;width:100%}
    .logo-ring{width:120px;height:120px;border-radius:28px;background:linear-gradient(135deg,#0d0d22,#1a1a3e);border:2px solid #6366f1;display:flex;align-items:center;justify-content:center;margin-bottom:2rem;box-shadow:0 0 40px #6366f140}
    .pv{font-size:2.8rem;font-weight:900;background:linear-gradient(135deg,#818cf8,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    h1{font-size:clamp(2rem,6vw,4rem);font-weight:800;letter-spacing:-1px;margin-bottom:1rem}
    h1 span{background:linear-gradient(135deg,#818cf8,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .sub{font-size:1.2rem;color:#9ca3af;max-width:520px;line-height:1.7;margin-bottom:2.5rem}
    .niches{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;margin-bottom:3rem}
    .niche{padding:.5rem 1.2rem;border-radius:999px;font-size:.85rem;font-weight:600;border:1px solid}
    .n1{background:#1f2937;color:#f9a8d4;border-color:#374151}
    .n2{background:#1f1a00;color:#fcd34d;border-color:#44380a}
    .n3{background:#001f3f;color:#38bdf8;border-color:#0c3050}
    .n4{background:#1c0f00;color:#fb923c;border-color:#431f00}
    .platforms{color:#6b7280;font-size:.9rem;margin-top:1rem}
    .platforms strong{color:#818cf8}
    footer{padding:2rem;color:#374151;font-size:.8rem;text-align:center}
    footer a{color:#4f46e5;text-decoration:none}
    footer a:hover{text-decoration:underline}
    .pulse-line{width:200px;height:2px;background:linear-gradient(90deg,transparent,#6366f1,transparent);margin:2rem auto;opacity:.5}
  </style>
</head>
<body>
  <div class="hero">
    <div class="logo-ring"><span class="pv">PV</span></div>

    <h1>PULSE<span>VAULT</span></h1>
    <p class="sub">
      Daily short-form content covering motivation, luxury lifestyle,
      tech facts, and car culture. Built for those who move fast.
    </p>

    <div class="niches">
      <span class="niche n1">🔥 Motivation</span>
      <span class="niche n2">💎 Luxury</span>
      <span class="niche n3">⚡ Tech</span>
      <span class="niche n4">🚗 Cars</span>
    </div>

    <div class="pulse-line"></div>

    <p class="platforms">
      Follow us on <strong>TikTok</strong> &amp; <strong>Instagram</strong> @PulseVault
    </p>
  </div>

  <footer>
    <p>&copy; 2026 PulseVault. All rights reserved.</p>
    <p style="margin-top:.5rem">
      <a href="privacy.html">Privacy Policy</a> &nbsp;·&nbsp;
      <a href="terms.html">Terms of Service</a>
    </p>
  </footer>
</body>
</html>
