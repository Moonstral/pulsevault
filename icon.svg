<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0f0f2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <clipPath id="round">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Glow blob behind pulse -->
  <ellipse cx="512" cy="430" rx="300" ry="180" fill="#6366f1" opacity="0.12" filter="url(#blur)"/>

  <!-- Vault circle (outer ring) -->
  <circle cx="512" cy="420" r="230" fill="none" stroke="#6366f1" stroke-width="6" opacity="0.25"/>
  <circle cx="512" cy="420" r="195" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.15"/>

  <!-- Vault door spokes -->
  <g stroke="#6366f1" stroke-width="3" opacity="0.2" transform="translate(512,420)">
    <line x1="0" y1="-195" x2="0" y2="195"/>
    <line x1="-195" y1="0" x2="195" y2="0"/>
    <line x1="-138" y1="-138" x2="138" y2="138"/>
    <line x1="138" y1="-138" x2="-138" y2="138"/>
  </g>

  <!-- Vault center disc -->
  <circle cx="512" cy="420" r="155" fill="#0d0d22"/>
  <circle cx="512" cy="420" r="150" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.6"/>

  <!-- Pulse waveform inside vault -->
  <!-- Flat line left -->
  <polyline
    points="292,420 352,420 372,420"
    fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- First small bump -->
  <polyline
    points="372,420 385,420 392,400 400,440 408,420"
    fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Main spike (heart pulse) -->
  <polyline
    points="408,420 435,420 452,360 468,480 484,390 500,420"
    fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small recovery bump -->
  <polyline
    points="500,420 516,420 524,435 532,405 540,420"
    fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Flat line right -->
  <polyline
    points="540,420 570,420 600,420 652,420 732,420"
    fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Glow under pulse line -->
  <polyline
    points="292,420 352,420 372,420 385,420 392,400 400,440 408,420 435,420 452,360 468,480 484,390 500,420 516,420 524,435 532,405 540,420 570,420 732,420"
    fill="none" stroke="#818cf8" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.08" filter="url(#softblur)"/>

  <!-- Vault handle/dial dots -->
  <circle cx="512" cy="275" r="8" fill="#6366f1" opacity="0.5"/>
  <circle cx="512" cy="565" r="8" fill="#6366f1" opacity="0.5"/>
  <circle cx="367" cy="420" r="8" fill="#6366f1" opacity="0.5"/>
  <circle cx="657" cy="420" r="8" fill="#6366f1" opacity="0.5"/>

  <!-- PV monogram watermark bottom -->
  <text
    x="512" y="660"
    font-family="'Arial', sans-serif"
    font-weight="900"
    font-size="52"
    fill="url(#accent)"
    text-anchor="middle"
    letter-spacing="18"
    opacity="0.9">PV</text>

  <!-- Brand name -->
  <text
    x="512"
    y="760"
    font-family="'Arial', sans-serif"
    font-weight="700"
    font-size="72"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="6"
    opacity="0.95">PULSE</text>

  <text
    x="512"
    y="840"
    font-family="'Arial', sans-serif"
    font-weight="300"
    font-size="72"
    fill="url(#accent)"
    text-anchor="middle"
    letter-spacing="14"
    opacity="0.95">VAULT</text>

  <!-- Thin bottom line accent -->
  <rect x="362" y="868" width="300" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>
</svg>
